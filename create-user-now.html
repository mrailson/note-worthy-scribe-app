<!DOCTYPE html>
<html>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Create User: egplearning@gmail.com</h1>
    <button id="createBtn" onclick="createUser()">Create User Account</button>
    <div id="status"></div>
    
    <script>

            const createBtn = document.getElementById('createBtn');
            
            createBtn.disabled = true;
            statusDiv.innerHTML = '<div class="loading">Creating user account...</div>';
            
            try {
                console.log('Step 1: Creating user with admin privileges...');
                
                const response = await fetch('https://dphcnbricafkbtizkoal.supabase.co/functions/v1/create-user-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaGNuYnJpY2Fma2J0aXprb2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI3MzIyMzIsImV4cCI6MjA2ODMwODIzMn0.U3bJI6P1yzgRBz_k2s0zlJGu1GWiVRTHjYgv9QQggPs'
                    },
                    body: JSON.stringify({
                        email: 'egplearning@gmail.com',
                        password: 'SurgeryConnect1',
                        fullName: 'EGP Learning User',
                        role: 'system_admin'
                    })
                });

                const result = await response.json();
                console.log('Create user response:', result);

                if (response.ok) {
                    statusDiv.innerHTML = '<div class="success">✅ User account created successfully!</div>';
                    
                    // Now assign practice manager role
                    statusDiv.innerHTML += '<div class="loading">Assigning practice manager role...</div>';
                    
                    const practiceResponse = await fetch('https://dphcnbricafkbtizkoal.supabase.co/functions/v1/create-user-practice-manager', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaGNuYnJpY2Fma2J0aXprb2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI3MzIyMzIsImV4cCI6MjA2ODMwODIzMn0.U3bJI6P1yzgRBz_k2s0zlJGu1GWiVRTHjYgv9QQggPs'
                        },
                        body: JSON.stringify({
                            email: 'egplearning@gmail.com',
                            fullName: 'EGP Learning User',
                            practiceRole: 'practice_manager',
                            moduleAccess: {
                                meeting_notes_access: true,
                                gp_scribe_access: true,
                                complaints_manager_access: true,
                                replywell_access: true,
                                enhanced_access: true,
                                cqc_compliance_access: true,
                                shared_drive_access: true,
                                mic_test_service_access: true,
                                api_testing_service_access: true
                            }
                        })
                    });
                    
                    const practiceResult = await practiceResponse.json();
                    console.log('Practice role response:', practiceResult);
                    
                    if (practiceResponse.ok) {
                        statusDiv.innerHTML += '<div class="success">✅ Practice manager role assigned successfully!</div>';
                        statusDiv.innerHTML += '<div class="success"><strong>Account Ready!</strong><br>Email: egplearning@gmail.com<br>Password: SurgeryConnect1<br>Role: Practice Manager for Oak Lane Medical Practice</div>';
                    } else {
                        statusDiv.innerHTML += '<div class="error">⚠️ User created but practice role assignment failed: ' + JSON.stringify(practiceResult) + '</div>';
                    }
                } else {
                    statusDiv.innerHTML = '<div class="error">❌ Failed to create user: ' + JSON.stringify(result) + '</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = '<div class="error">❌ Network error: ' + error.message + '</div>';
            } finally {
                createBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
