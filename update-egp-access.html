<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update EGP Learning Access</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .loading { background-color: #d1ecf1; color: #0c5460; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Update Access for eGPlearning@gmail.com</h1>
    <p>This will enable Meeting Notes access and AI4GP service access for the user.</p>
    
    <button id="updateBtn" onclick="updateUserAccess()">Update User Access</button>
    
    <div id="status"></div>

    <script>
        async function updateUserAccess() {
            const button = document.getElementById('updateBtn');
            const status = document.getElementById('status');
            
            button.disabled = true;
            status.innerHTML = '<div class="loading">Updating user access...</div>';
            
            try {
                // Update user_roles for meeting_notes_access
                const roleResponse = await fetch('https://dphcnbricafkbtizkoal.supabase.co/functions/v1/create-user-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaGNuYnJpY2Fma2J0aXprb2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI3MzIyMzIsImV4cCI6MjA2ODMwODIzMn0.U3bJI6P1yzgRBz_k2s0zlJGu1GWiVRTHjYgv9QQggPs'
                    },
                    body: JSON.stringify({
                        action: 'update_modules',
                        user_id: '1876c974-6ea7-4491-a16c-f3e99f5e3ff4',
                        module_access: {
                            meeting_notes_access: true,
                            gp_scribe_access: false,
                            complaints_manager_access: false,
                            complaints_admin_access: false,
                            replywell_access: false,
                            enhanced_access: false,
                            cqc_compliance_access: false,
                            shared_drive_access: false,
                            mic_test_service_access: false,
                            api_testing_service_access: false
                        },
                        ai4gp_access: true
                    })
                });
                
                if (!roleResponse.ok) {
                    throw new Error(`HTTP error! status: ${roleResponse.status}`);
                }
                
                const roleData = await roleResponse.json();
                console.log('Update response:', roleData);
                
                status.innerHTML = `
                    <div class="success">
                        Successfully updated access for eGPlearning@gmail.com!<br>
                        - Meeting Notes access: ✅ Enabled<br>
                        - AI4GP service access: ✅ Enabled
                    </div>
                `;
                
            } catch (error) {
                console.error('Error updating user access:', error);
                status.innerHTML = `
                    <div class="error">
                        Failed to update user access: ${error.message}<br>
                        Please try using the SystemAdmin page instead.
                    </div>
                `;
            } finally {
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
